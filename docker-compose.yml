# Local SQL Server for development (free Developer edition).
# Usage (after Docker Desktop is running):
#   docker compose up -d
# Connection string:
#   Server=localhost,1433;Database=NoticeSaaS;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: notice-saas-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - notice_saas_sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_strong_Password123' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  notice_saas_sql_data:
