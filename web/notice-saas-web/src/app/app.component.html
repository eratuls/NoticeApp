<main class="shell">
  <header class="brand">
    <p class="eyebrow">Day 1 scaffold</p>
    <h1>{{ title }}</h1>
    <p class="lede">Angular + ASP.NET Core — health check</p>
  </header>

  <section class="status" [attr.data-state]="apiStatus()">
    @if (apiStatus() === 'checking') {
      <p>Checking API…</p>
    } @else if (apiStatus() === 'ok') {
      <p class="ok">API OK</p>
      <p class="meta">{{ detail() }}</p>
    } @else {
      <p class="err">API unreachable</p>
      <p class="meta">{{ detail() }}</p>
      <p class="hint">Run the API: <code>dotnet run --project src/NoticeSaaS.Api</code></p>
    }
    <button type="button" (click)="checkApi()">Recheck</button>
  </section>
</main>
