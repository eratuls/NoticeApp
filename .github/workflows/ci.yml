name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore NoticeSaaS.sln

      - name: Build
        run: dotnet build NoticeSaaS.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/NoticeSaaS.UnitTests/NoticeSaaS.UnitTests.csproj -c Release --no-build --verbosity normal

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/notice-saas-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/notice-saas-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build -- --configuration=production
